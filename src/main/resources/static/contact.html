<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Contact List</h1>
    <button onclick="location.href='index.html'">Back to Home</button>
    <button onclick = "bubbleAnimate()" id="bubble">Start Bubble Sort</button>

    <span id = "sort-status"></span>

    <div style="text-align: center; margin: 10px 0;">
        <input type="text" id="search-input" placeholder="Search by last name..">
        <span id="search-status"></span>
        
    </div>


<table>
    <thead>
    <tr>
        <th>Contact ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Phone</th>
        <th>Address</th>
    </tr>
    </thead>
  <tbody id="contact-body">

  </tbody>
</table>

<script>
    let contacts = [];  // global so bubbleAnimate() in main.js can access it

    function renderTable(data) {
        const tbody = document.getElementById('contact-body');
        console.log("tbody", tbody);
        console.log("data", data.length);
        tbody.innerHTML = data.map(contact => `
            <tr>
                <td>${contact.contactID}</td>
                <td>${contact.firstName}</td>
                <td>${contact.lastName}</td>
                <td>${contact.phoneNumber}</td>
                <td>${contact.address}</td>
            </tr>
        `).join('');
    }

    fetch('/api/contacts')
        .then(response => response.json())
        .then(data => {
            contacts = data;        // store globally
            renderTable(contacts);  // render on load
        })
        .catch(error => console.error('Error fetching contacts:', error));
</script>


<script src="contactBubble.js"></script>
</body>
