<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Task List</h1>
    <button onclick="location.href='index.html'">Back to Home</button>
    <button onclick = "bubbleAnimate()" id="bubble">Start Bubble Sort</button>
   
    <span id = "sort-status"></span>

    <div style="text-align: center; margin: 10px 0;">
        <input type="text" id="search-input" placeholder="Search by name..">
        <span id="search-status"></span>
    </div>

<table>
    <thead>
    <tr>
        <th>Task ID</th>
        <th>Name</th>
        <th>Description</th>
    </tr>
    </thead>
  <tbody id="task-body">

  </tbody>
</table>

<script>
    let tasks = [];  // global so bubbleAnimate() in main.js can access it

    function renderTable(data) {
        const tbody = document.getElementById('task-body');
        console.log("tbody", tbody);
        console.log("data", data.length);
        tbody.innerHTML = data.map(task => `
            <tr>
                <td>${task.taskId}</td>
                <td>${task.taskName}</td>
                <td>${task.description}</td>
            </tr>
        `).join('');
    }

    fetch('/api/tasks')
        .then(response => response.json())
        .then(data => {
            tasks = data;        // store globally
            renderTable(tasks);  // render on load
        })
        .catch(error => console.error('Error fetching tasks:', error));
</script>

<script src="taskBubble.js"></script>
</body>
